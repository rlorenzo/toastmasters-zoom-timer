name: Lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Full history so `fallow audit` can diff against the base branch.
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint

      # Runs the Vitest suite and produces coverage/coverage-final.json.
      - run: npm run coverage

      # Coverage-driven complexity/CRAP gate: fails on newly introduced complexity,
      # dead code, or duplication vs the PR base. fallow can't auto-detect the base
      # in CI's detached checkout, so pass it explicitly.
      - name: Complexity/CRAP gate
        if: github.event_name == 'pull_request'
        run: npx fallow audit --gate new-only --coverage coverage/coverage-final.json --base "origin/${{ github.base_ref }}"
