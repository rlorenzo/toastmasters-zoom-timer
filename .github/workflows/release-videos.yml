name: Release videos

# Regenerate the Zoom virtual-background timer videos and refresh the Release
# assets whenever something that affects them lands on main. Only the inputs that
# define the videos trigger a run, so unrelated changes (docs, app UI) don't.
on:
  push:
    branches: [main]
    paths:
      - timer-core.js
      - tools/generate-bg-video.mjs
      - images/**
      - fonts/**
      - .github/workflows/release-videos.yml
  workflow_dispatch:

# Need write access to publish Release assets.
permissions:
  contents: write

# A newer push supersedes an in-flight run; no point publishing stale videos.
concurrency:
  group: release-videos
  cancel-in-progress: true

jobs:
  release-videos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # No step pushes via git (releases go through gh/GH_TOKEN), so don't
          # persist the token in .git/config on this contents:write workflow.
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # Only used to encode the canvas-rendered frames into H.264; the slim build
      # is fine since no text filter is involved.
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Generate all videos
        run: node tools/generate-bg-video.mjs all

      # Publish to a single fixed-tag release and overwrite same-named assets, so
      # only the current set is ever stored (no old-version clutter, no git bloat
      # since dist/ is gitignored).
      - name: Publish to Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag=timer-videos
          gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" \
            --title "Toastmasters timer virtual backgrounds" \
            --notes "Auto-generated Zoom virtual-background timer videos, refreshed on every relevant change to main. Two layouts per speech type: \`-corner\` (keep your webcam on) and \`-center\` (webcam off, big timer)."
          gh release upload "$tag" dist/tm-timer-*.mp4 --clobber
